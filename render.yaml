services:
  - type: web
    name: momplan-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3636"
      # The following must be set manually in the Render Dashboard:
      # - DATABASE_URL
      # - DIRECT_URL
      # - JWT_SECRET
      # - JWT_REFRESH_SECRET
      # - FRONTEND_URL
      # - ADMIN_FRONTEND_URL
